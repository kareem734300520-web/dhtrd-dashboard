function totals(rows){let obj={rev:0,cogs:0,gp:0,opex:0,op:0,np:0};rows.forEach(r=>{if(r['البند']==='اجمالي الدخل')obj.rev=r['القيمة'];if(r['البند']==='تكلفة البضاعة المباعة في التجارة')obj.cogs=r['القيمة'];if(r['البند']==='مجمل الربح')obj.gp=r['القيمة'];if(r['البند']==='إجمالي المصاريف التشغيلية')obj.opex=r['القيمة'];if(r['البند']==='الربح التشغيلي')obj.op=r['القيمة'];if(r['البند']==='صافي الربح')obj.np=r['القيمة']});return obj}
function renderKpis(){let b=DATA.branches[idx];let t=totals(b.rows);let k=[['إجمالي الدخل',t.rev,'cyan'],['مجمل الربح',t.gp,t.gp>=0?'good':'bad'],['المصاريف التشغيلية',Math.abs(t.opex),'bad'],['صافي الربح',t.np,t.np>=0?'good':'bad']];document.getElementById('kpis').innerHTML=k.map(x=>'<div class="card"><div class="label">'+x[0]+'</div><div class="value '+x[2]+'">'+fmt(x[1])+'</div><div class="bar"><span style="width:'+Math.min(100,Math.abs(x[1])/(Math.abs(t.rev)||1)*100)+'%"></span></div></div>').join('')}
function rowClass(r){if(['اجمالي الدخل','إجمالي المصاريف التشغيلية'].includes(r['البند']))return 'total-row';if(['مجمل الربح','الربح التشغيلي','صافي الربح'].includes(r['البند']))return r['القيمة']<0?'loss-row':'profit-row';if(['تكلفة المبيعات'].includes(r['القسم']))return 'section-row';return ''}
function renderTable(){let b=DATA.branches[idx];let q=(document.getElementById('searchBox').value||'').trim();let rows=b.rows.filter(r=>!q || r['البند'].includes(q) || r['القسم'].includes(q));document.getElementById('branchTitle').textContent=b['الفرع'];document.getElementById('note').textContent='عدد البنود المعروضة بعد استبعاد الصفر: '+rows.length+' بند';document.getElementById('stmtTable').innerHTML='<tr><th>القسم</th><th>البند</th><th>القيمة</th><th>النسبة من الدخل</th></tr>'+rows.map(r=>'<tr class="'+rowClass(r)+'"><td>'+r['القسم']+'</td><td>'+r['البند']+'</td><td class="num">'+fmt(r['القيمة'])+'</td><td class="num">'+pct(r['النسبة'])+'</td></tr>').join('')}
function renderMenu(){document.getElementById('menu').innerHTML=DATA.branches.map((b,i)=>'<button class="branch '+(i===idx?'active':'')+'" onclick="idx='+i+';renderAll()">'+b['الفرع']+'</button>').join('')}
function renderAll(){document.getElementById('branchSelect').value=idx;renderKpis();renderMenu();renderTable()}
function moveBranch(d){idx=(idx+d+DATA.branches.length)%DATA.branches.length;renderAll()}
function setup(){document.getElementById('branchSelect').innerHTML=DATA.branches.map((b,i)=>'<option value="'+i+'">'+b['الفرع']+'</option>').join('');document.getElementById('branchSelect').onchange=e=>{idx=Number(e.target.value);renderAll()};renderAll()}setup();
</script></body></html>
